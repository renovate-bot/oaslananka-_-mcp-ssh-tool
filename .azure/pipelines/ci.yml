name: CI — $(Date:yyyyMMdd).$(Rev:r)

# Azure is intentionally manual-only.
# Automatic CI/CD runs in the GitHub org mirror: github.com/oaslananka-lab/mcp-ssh-tool.
trigger: none
pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "24.14.1"
  NODE_COMPAT_VERSION: "22.22.2"
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Quality
    displayName: "Quality Checks"
    jobs:
      - job: LintTypeCheck
        displayName: "Quality Gate Parity"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: npm install -g npm@11.12.1
            displayName: "Install pinned npm"

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: "Cache npm packages"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run check:quality
            displayName: "Run local quality gate parity"

      - job: Test
        displayName: "Unit Tests"
        strategy:
          matrix:
            Node22:
              NODE_VERSION: "$(NODE_COMPAT_VERSION)"
            Node24:
              NODE_VERSION: "$(NODE_VERSION)"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: npm install -g npm@11.12.1
            displayName: "Install pinned npm"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run test:coverage
            displayName: "Run tests with coverage"

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "**/test-results/*.xml"
              mergeTestResults: true
              testRunTitle: "Unit Tests"
            displayName: "Publish test results"

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              codeCoverageTool: "Cobertura"
              summaryFileLocation: "coverage/cobertura-coverage.xml"
              reportDirectory: "coverage/lcov-report"
            displayName: "Publish code coverage"

      - job: Integration
        displayName: "Integration Tests"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: npm install -g npm@11.12.1
            displayName: "Install pinned npm"

          - script: npm ci
            displayName: "Install dependencies"

          - script: docker compose up -d ssh-server
            displayName: "Start SSH integration fixture"

          - script: npm run test:integration
            displayName: "Run integration tests"
            env:
              RUN_SSH_INTEGRATION: "1"
              TEST_SSH_HOST: "localhost"
              TEST_SSH_PORT: "2222"
              TEST_SSH_USER: "testuser"
              TEST_SSH_PASS: "testpass"

          - script: docker compose down --remove-orphans
            condition: always()
            displayName: "Stop SSH integration fixture"

      - job: Build
        displayName: "Build"
        dependsOn:
          - LintTypeCheck
          - Test
          - Integration
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: npm install -g npm@11.12.1
            displayName: "Install pinned npm"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run check:package
            displayName: "Verify package parity"

          - script: |
              mkdir -p artifacts
              npm sbom --sbom-format=spdx > artifacts/sbom.spdx.json
            displayName: "Generate SBOM"

          - script: |
              mkdir -p artifacts
              PACKAGE_FILE=$(npm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d)[0].filename));")
              sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"
            displayName: "Generate package artifact hash"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "dist"
              ArtifactName: "dist"
            displayName: "Publish build artifacts"

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: "artifacts"
              ArtifactName: "release-artifacts"
            displayName: "Publish SBOM and package hashes"
