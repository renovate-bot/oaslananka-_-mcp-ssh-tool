name: Publish — v$(PACKAGE_VERSION)

# Azure publish validation is manual-only. npm provenance publishing is performed
# from the GitHub org mirror after this pipeline produces a validation run URL.
trigger: none
pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "24.14.1"
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Validate
    displayName: "Pre-publish Validation"
    jobs:
      - job: ValidateVersion
        displayName: "Validate version consistency"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "$(NODE_VERSION)"
            displayName: "Install Node.js $(NODE_VERSION)"

          - script: npm install -g npm@11.12.1
            displayName: "Install pinned npm"

          - script: npm ci
            displayName: "Install dependencies"

          - script: |
              PKG_VER=$(node -p "require('./package.json').version")
              MCP_VER=$(node -p "require('./mcp.json').version")
              SRC_VER=$(node -e "const fs=require('fs'); const text=fs.readFileSync('src/mcp.ts','utf8'); const match=text.match(/export const SERVER_VERSION = ['\\\"]([^'\\\"]+)['\\\"]/); if(!match){process.exit(1)} console.log(match[1])")

              echo "package.json: $PKG_VER"
              echo "mcp.json: $MCP_VER"
              echo "src/mcp.ts: $SRC_VER"

              if [ "$PKG_VER" != "$MCP_VER" ] || [ "$PKG_VER" != "$SRC_VER" ]; then
                echo "##vso[task.logissue type=error]Version mismatch! Run 'npm run sync-version' before tagging."
                exit 1
              fi

              echo "##vso[task.setvariable variable=PACKAGE_VERSION;isOutput=true]$PKG_VER"
            displayName: "Check version consistency"
            name: SetVersion

          - script: |
              PKG_NAME=$(node -p "require('./package.json').name")
              PKG_VER=$(node -p "require('./package.json').version")

              if npm view "${PKG_NAME}@${PKG_VER}" version --silent > /dev/null 2>&1; then
                echo "##vso[task.logissue type=error]${PKG_NAME}@${PKG_VER} already exists on npm!"
                exit 1
              fi
              echo "Version ${PKG_VER} not yet published. Proceeding."
            displayName: "Check npm version availability"

          - script: |
              TAG="${BUILD_SOURCEBRANCH#refs/tags/v}"
              PKG_VER=$(node -p "require('./package.json').version")
              if [ "$TAG" != "$PKG_VER" ]; then
                echo "##vso[task.logissue type=error]Git tag v${TAG} does not match package.json version ${PKG_VER}"
                exit 1
              fi
            displayName: "Check tag matches package version"
            condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/')

  - stage: PackageValidation
    displayName: "Package validation for trusted publish handoff"
    dependsOn: Validate
    jobs:
      - deployment: ValidateNpmPackage
        displayName: "Validate package"
        environment: "npm-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: NodeTool@0
                  inputs:
                    versionSpec: "$(NODE_VERSION)"
                  displayName: "Install Node.js $(NODE_VERSION)"

                - script: npm install -g npm@11.12.1
                  displayName: "Install pinned npm"

                - script: npm ci
                  displayName: "Install dependencies"

                - script: npm run check
                  displayName: "Run release-quality gate"

                - script: |
                    mkdir -p artifacts
                    npm sbom --sbom-format=spdx > artifacts/sbom.spdx.json
                    PACKAGE_FILE=$(npm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d)[0].filename));")
                    sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"
                  displayName: "Generate SBOM and package hash"

                - task: PublishBuildArtifacts@1
                  inputs:
                    PathtoPublish: "artifacts"
                    ArtifactName: "trusted-publish-inputs"
                  displayName: "Publish trusted-publish handoff artifacts"

                - script: |
                    echo "Azure validation complete."
                    echo "Use GitHub workflow 'Publish with npm Provenance' with this Azure run URL."
                  displayName: "Trusted publish handoff instructions"

  - stage: CreateRelease
    displayName: "Record Azure validation"
    dependsOn: PackageValidation
    jobs:
      - job: TagAndRelease
        displayName: "Create release notes"
        steps:
          - script: |
              PKG_VER=$(node -p "require('./package.json').version")
              echo "Validated mcp-ssh-tool v${PKG_VER} for GitHub trusted publishing"
              echo "##vso[build.addbuildtag]v${PKG_VER}"
              echo "##vso[build.addbuildtag]validated-for-publish"
            displayName: "Tag build as validated"
