name: Publish with npm Provenance

on:
  workflow_dispatch:
    inputs:
      azure_run_url:
        description: "Azure publish validation run URL"
        required: true
      confirm:
        description: "Type PUBLISH to publish the package"
        required: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.repository_owner == 'oaslananka-lab' && inputs.confirm == 'PUBLISH' }}
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Record Azure validation URL
        run: |
          echo "Azure validation: ${{ inputs.azure_run_url }}"

      - name: Install
        run: npm ci

      - name: Verify package
        run: npm run check

      - name: Publish
        run: npm publish --access public --provenance
