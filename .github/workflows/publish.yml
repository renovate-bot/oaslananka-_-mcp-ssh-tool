# ──────────────────────────────────────────────────────────────────────────────
# mcp-ssh-tool — Emergency Manual Publish (GitHub)
#
# PRIMARY source is the personal GitHub repository.
# Automatic CI/CD and trusted npm publishing run in the oaslananka-lab org mirror.
# This workflow exists as a personal-repo manual fallback ONLY.
#
# When to use:
#   - Azure Pipelines is temporarily unavailable
#   - Hotfix needed and Azure access is blocked
#
# How to trigger:
#   GitHub → Actions tab → "Publish (Manual)" → "Run workflow" → type YES
# ──────────────────────────────────────────────────────────────────────────────
name: Publish (Manual — Emergency GitHub Fallback)

# Manual trigger only.
# Use this workflow only from github.com/oaslananka/mcp-ssh-tool.
on:
  workflow_dispatch:
    inputs:
      version_check:
        description: "Confirm version in package.json is correct (type YES)"
        required: true
        default: ""

concurrency:
  group: publish-manual-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'oaslananka' && github.event.inputs.version_check == 'YES' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Fetch publish secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ secrets.DOPPLER_PROJECT || 'all' }}
          doppler-config: ${{ secrets.DOPPLER_CONFIG || 'main' }}

      - name: Install
        run: npm ci

      - name: Guard - version must not already exist on npm
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          echo "Checking ${PKG_NAME}@${PKG_VER} on npm..."
          if npm view "${PKG_NAME}@${PKG_VER}" version --silent > /dev/null 2>&1; then
            echo "ERROR: ${PKG_NAME}@${PKG_VER} already exists on npm."
            exit 1
          fi

      - name: Verify release quality
        run: npm run check

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ steps.doppler.outputs.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
