# ──────────────────────────────────────────────────────────────────────────────
# mcp-ssh-tool — Emergency Manual Publish (GitHub)
#
# PRIMARY CI/CD is on Azure DevOps (/.azure/pipelines/).
# This workflow exists as a manual fallback ONLY.
#
# When to use:
#   - Azure Pipelines is temporarily unavailable
#   - Hotfix needed and Azure access is blocked
#
# How to trigger:
#   GitHub → Actions tab → "Publish (Manual)" → "Run workflow" → type YES
# ──────────────────────────────────────────────────────────────────────────────
name: Publish (Manual — Emergency GitHub Fallback)

# Manual trigger only.
# Azure Pipelines remains the primary validation path.
# Use this workflow only for an emergency GitHub fallback.
on:
  workflow_dispatch:
    inputs:
      version_check:
        description: 'Confirm version in package.json is correct (type YES)'
        required: true
        default: ''

concurrency:
  group: publish-manual-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.version_check == 'YES' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Guard - version must not already exist on npm
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VER="$(node -p "require('./package.json').version")"
          echo "Checking ${PKG_NAME}@${PKG_VER} on npm..."
          if npm view "${PKG_NAME}@${PKG_VER}" version --silent > /dev/null 2>&1; then
            echo "ERROR: ${PKG_NAME}@${PKG_VER} already exists on npm."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Version sync
        run: npm run sync-version -- --check

      - name: Package contents
        run: npm run pack:check

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
