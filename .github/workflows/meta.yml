name: Fast Lint and Metadata

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: meta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Workflow and Metadata Lint
    if: ${{ github.repository == 'oaslananka-lab/mcp-ssh-tool' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: node scripts/use-ci-npm.mjs

      - name: Install
        run: npm ci

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Install zizmor
        run: |
          python3 -m pip install --user zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate workflow guards
        run: node scripts/check-workflow-guards.mjs

      - name: Lint workflows
        run: bash scripts/run-workflow-lints.sh

      - name: Validate release metadata
        run: npm run sync-version -- --check && npm run validate:mcp-metadata && npm run validate:chatgpt-app
