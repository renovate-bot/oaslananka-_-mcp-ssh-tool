name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    if: ${{ github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Install
        run: npm ci

      - name: Quality gate parity
        run: npm run check:quality

  unit:
    name: Unit Tests (Node ${{ matrix.node }})
    if: ${{ github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.22.2
          - 24.14.1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Install
        run: npm ci

      - name: Unit coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always() && matrix.node == '24.14.1'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  integration:
    name: SSH Integration
    if: ${{ github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Install
        run: npm ci

      - name: Start SSH fixture
        run: docker compose up -d ssh-server

      - name: Run integration tests
        run: npm run test:integration
        env:
          RUN_SSH_INTEGRATION: "1"
          TEST_SSH_HOST: localhost
          TEST_SSH_PORT: "2222"
          TEST_SSH_USER: testuser
          TEST_SSH_PASS: testpass

      - name: Stop SSH fixture
        if: always()
        run: docker compose down --remove-orphans

  package:
    name: Build, SBOM, and Pack
    if: ${{ github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs:
      - quality
      - unit
      - integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Install
        run: npm ci

      - name: Package parity
        run: npm run check:package

      - name: Generate SBOM and package hash
        run: |
          mkdir -p artifacts
          npm sbom --sbom-format=spdx > artifacts/sbom.spdx.json
          PACKAGE_FILE=$(npm pack --pack-destination artifacts --json | node -e "let d=''; process.stdin.on('data', c => d += c); process.stdin.on('end', () => console.log(JSON.parse(d)[0].filename));")
          sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"

      - name: Upload release verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-verification
          path: artifacts
